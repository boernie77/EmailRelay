repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: jinja2-syntax
        name: Jinja2 template syntax check
        language: python
        entry: python check_templates.py
        files: alias-api/templates/.*\.html$
        additional_dependencies: [jinja2]
