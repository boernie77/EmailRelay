<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mail Relay – Impressum</title>
    <style>
    body {
      max-width: 720px;
      padding: 0 24px;
      margin: 40px auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      color: #1f2937;
    }
    h1 {
      margin-bottom: 4px;
      font-size: 1.6rem;
    }
    .sub {
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: #6b7280;
    }
    p,
    li {
      font-size: 0.95rem;
      color: #374151;
    }
    .content {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #374151;
      white-space: pre-wrap;
    }
    .placeholder {
      padding: 16px;
      font-size: 0.9rem;
      color: #92400e;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
    }
    .back {
      display: block;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: #6b7280;
    }
    footer {
      padding-top: 1rem;
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
    }
    footer a {
      color: #6b7280;
    }
    </style>
  </head>
  <body>
    <a href="/login" class="back">← Zurück zur Anmeldung</a>
    <h1>Impressum</h1>
    <p class="sub">Angaben gemäß § 5 TMG</p>
    { % if impressum_text %}
    <div class="content">{{ impressum_text }}</div>
    { % else %}
    <div class="placeholder">
      Das Impressum wurde noch nicht eingerichtet.<br>
      Administratoren können es unter
      <strong>Einstellungen → Impressum</strong>
      konfigurieren.
    </div>
    { % endif %}

    <footer>
      <a href="/privacy">Datenschutzerklärung</a>
      &nbsp;|&nbsp;
      <a href="/login">Zur Anmeldung</a>
    </footer>
  </body>
</html>
