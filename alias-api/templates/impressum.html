<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Mail Relay – Impressum</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 24px; color: #1f2937; line-height: 1.7; }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .sub { color: #6b7280; font-size: 0.9rem; margin-bottom: 2rem; }
    p, li { font-size: 0.95rem; color: #374151; }
    .content { white-space: pre-wrap; font-size: 0.95rem; color: #374151; line-height: 1.7; }
    .placeholder { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 16px; font-size: 0.9rem; color: #92400e; }
    .back { font-size: 0.9rem; color: #6b7280; margin-bottom: 2rem; display: block; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; font-size: 0.85rem; color: #9ca3af; }
    footer a { color: #6b7280; }
  </style>
</head>
<body>
  <a href="/login" class="back">← Zurück zur Anmeldung</a>
  <h1>Impressum</h1>
  <p class="sub">Angaben gemäß § 5 TMG</p>

  {% if impressum_text %}
  <div class="content">{{ impressum_text }}</div>
  {% else %}
  <div class="placeholder">
    Das Impressum wurde noch nicht eingerichtet.<br>
    Administratoren können es unter <strong>Einstellungen → Impressum</strong> konfigurieren.
  </div>
  {% endif %}

  <footer>
    <a href="/privacy">Datenschutzerklärung</a> &nbsp;|&nbsp;
    <a href="/login">Zur Anmeldung</a>
  </footer>
</body>
</html>
