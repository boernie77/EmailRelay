{ % extends "base.html" %} { % block title %} – VPS bearbeiten { % endblock %} {
% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/vps" class="text-sm text-blue-600 hover:underline"
    >← VPS-Konfiguration</a
  >
  <span class="text-gray-400">/</span>
  <h1 class="text-2xl font-bold">{{ vps.label or vps.host }} bearbeiten</h1>
</div>

<div class="bg-white rounded-xl shadow p-6">
  <form method="post" action="/vps/{{ vps.id }}/edit" class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Bezeichnung
          <span class="text-gray-400 font-normal">(optional)</span></label
        >
        <input
          type="text"
          name="label"
          value="{{ vps.label }}"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Host / IP <span class="text-red-500">*</span></label
        >
        <input
          type="text"
          name="host"
          value="{{ vps.host }}"
          required
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >SSH-Port</label
        >
        <input
          type="number"
          name="port"
          value="{{ vps.port }}"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >SSH-Benutzer</label
        >
        <input
          type="text"
          name="user_str"
          value="{{ vps.user }}"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >API-URL für VPS</label
        >
        <input
          type="text"
          name="api_url"
          value="{{ vps.api_url }}"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >SSH-Private-Key (PEM)</label
        >
        <textarea
          name="ssh_key"
          rows="6"
          class="w-full border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
          {{ vps.ssh_key }}
        </textarea>
      </div>
    </div>
    <div class="flex gap-3">
      <button
        type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg transition text-sm"
      >
        Speichern
      </button>
      <a
        href="/vps"
        class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-2 rounded-lg transition text-sm"
      >
        Abbrechen
      </a>
    </div>
  </form>
</div>
{ % endblock %}
