<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmailRelay – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-1">📧 E-Mail Relay</h1>
    <p class="text-center text-gray-400 text-sm mb-6" style="font-family: 'Dancing Script', cursive; font-size: 1.1rem;">by boernie.de</p>

    {% if not has_users %}
    <div class="bg-blue-50 border border-blue-300 text-blue-700 text-sm px-4 py-3 rounded mb-4">
      Erstes Login — dieser Account wird als Administrator angelegt.
    </div>
    {% endif %}

    {% if error %}
    <div class="bg-red-50 border border-red-400 text-red-700 text-sm px-4 py-3 rounded mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Benutzername</label>
        <input type="text" name="username" autofocus required
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
        <input type="password" name="password" required
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
        {% if not has_users %}Admin-Account erstellen & anmelden{% else %}Anmelden{% endif %}
      </button>
    </form>
  </div>
</body>
</html>
