<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f9fafb;
    }
    header {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px 16px;
      color: white;
      background: #1e3a5f;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    header span {
      font-size: 11px;
      color: #93c5fd;
    }
    .content {
      padding: 16px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    select,
    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }
    select:focus,
    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }
    button.primary {
      width: 100%;
      padding: 9px;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      background: #2563eb;
      border: none;
      border-radius: 6px;
    }
    button.primary:hover {
      background: #1d4ed8;
    }
    button.primary:disabled {
      cursor: default;
      background: #93c5fd;
    }
    #result {
      display: none;
    }
    .alias-box {
      padding: 12px;
      margin-bottom: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
    }
    .alias-box .alias-text {
      margin-bottom: 8px;
      font-family: monospace;
      font-size: 13px;
      color: #1d4ed8;
      word-break: break-all;
    }
    .alias-box .copied-note {
      font-size: 11px;
      color: #6b7280;
    }
    button.secondary {
      width: 100%;
      padding: 7px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }
    button.secondary:hover {
      background: #f3f4f6;
    }
    #error {
      display: none;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
    }
    #loading {
      padding: 8px 0;
      font-size: 12px;
      color: #6b7280;
    }
    .footer {
      padding: 8px 16px;
      text-align: right;
      border-top: 1px solid #e5e7eb;
    }
    .footer a {
      font-size: 11px;
      color: #9ca3af;
      text-decoration: none;
    }
    .footer a:hover {
      color: #6b7280;
    }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>E-Mail Relay</h1>
        <span id="site-domain"></span>
      </div>
    </header>

    <div class="content">
      <div id="error"></div>
      <div id="loading">Lädt Adressen…</div>

      <div id="main" style="display:none">
        <div class="field">
          <label>Weiterleiten an</label>
          <select id="address"></select>
        </div>
        <div class="field">
          <label>Bezeichnung</label>
          <input type="text" id="label" placeholder="z.B. Amazon, Newsletter …">
        </div>
        <button class="primary" id="create">Alias erstellen</button>
      </div>

      <div id="result">
        <div class="alias-box">
          <div class="alias-text" id="alias-display"></div>
          <div class="copied-note" id="copy-note">
            In Zwischenablage kopiert ✓
          </div>
        </div>
        <button class="secondary" id="copy">Nochmal kopieren</button>
        <button class="primary" id="new-alias" style="margin-top:8px">
          Weiteren Alias erstellen
        </button>
      </div>
    </div>

    <div class="footer"><a href="#" id="settings-link">Einstellungen</a></div>

    <script src="popup.js"></script>
  </body>
</html>
